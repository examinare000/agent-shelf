name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync
      - run: uv run pytest -q
      - run: uv run ruff check .

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      # リポジトリ直下の .gitleaks.toml（tests/ 配下のダミー秘密情報フィクスチャの
      # allowlist）は、gitleaks-action が --config を渡さない場合に gitleaks CLI 自身が
      # target path 直下から自動検出する既定挙動（公式README「order of precedence」の
      # 4番目）に従うため、config パス指定は不要。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
